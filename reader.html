<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reader MVP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --reader-bg:#f6f7f9; --panel-bg:#fff; --border:rgba(0,0,0,.08); --text:#1f2328; --muted:rgba(31,35,40,.68); --accent:#0d6efd; --title:#101828; --deck:#344054; }
    body { background: var(--reader-bg); color: var(--text); }
    .app-shell { height: 100vh; display:flex; flex-direction:column; }
    .topbar { background: var(--panel-bg); border-bottom:1px solid var(--border); }
    .main { flex:1; display:grid; grid-template-columns:320px minmax(0,1fr) 360px; gap:12px; padding:12px; overflow:hidden; }
    .panel { background: var(--panel-bg); border:1px solid var(--border); border-radius:12px; overflow:hidden; display:flex; flex-direction:column; min-height:0; }
    .panel-header { padding:10px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .panel-body { padding:12px; overflow:auto; min-height:0; }
    .article-title { font-weight:700; font-size:.95rem; line-height:1.25rem; margin-bottom:2px; }
    .article-meta { color: var(--muted); font-size:.8rem; }
    .reader { padding:26px 24px 60px; max-width:780px; margin:0 auto; font-size:var(--reader-font-size,18px); line-height:1.7; text-rendering:optimizeLegibility; }
    .reader .reader-article-header { margin:0 0 22px; padding:0 0 14px; border-bottom:1px solid var(--border); }
    .reader .reader-article-title { margin:0 0 .55em; font-size:clamp(1.55rem,2vw,1.95rem); letter-spacing:-.012em; font-weight:700; line-height:1.22; color:var(--title); text-wrap:balance; overflow-wrap:anywhere; }
    .reader .reader-article-deck { margin:0 0 10px; }
    .reader .reader-article-deck p { margin:0 0 .65em; font-size:1.02em; color:var(--deck); }
    .reader .reader-article-meta { color:var(--muted); font-size:.92rem; display:flex; flex-wrap:wrap; gap:10px; }
    .reader .reader-article-meta .byline a { color:var(--accent); }
    .reader figure.reader-figure, .import-preview figure.reader-figure { margin:14px 0; border-radius:14px; overflow:hidden; }
    .reader figure.reader-figure img, .import-preview figure.reader-figure img { display:block; width:100%; height:auto; }
    .reader figure.reader-figure figcaption, .import-preview figure.reader-figure figcaption { padding:10px 12px; font-size:.92rem; color:var(--muted); background:rgba(0,0,0,.02); }
    .reader h1, .reader h2, .reader h3 { margin-top:1.2em; margin-bottom:.6em; line-height:1.2; }
    .reader p { margin:0 0 1em; }
    .reader blockquote { border-left:4px solid rgba(13,110,253,.25); padding-left:12px; color:rgba(31,35,40,.78); }
    .reader a { color:var(--accent); text-decoration:none; }
    .reader a:hover { text-decoration:underline; }
    .reader mark[data-highlight-id] { padding:.05em .15em; border-radius:6px; cursor:pointer; }
    .reader mark[data-highlight-id].active { outline:2px solid rgba(13,110,253,.55); outline-offset:2px; }
    .reader.clean-mode [data-clean-target] { position:relative; }
    .reader.clean-mode .clean-remove-btn, .reader.clean-mode .edit-pencil-btn { position:absolute; top:8px; width:28px; height:28px; border-radius:999px; border:1px solid rgba(0,0,0,.10); background:rgba(255,255,255,.92); display:grid; place-items:center; box-shadow:0 2px 10px rgba(0,0,0,.10); cursor:pointer; opacity:0; transition:opacity .12s ease; z-index:5; }
    .reader.clean-mode .clean-remove-btn { right:8px; }
    .reader.clean-mode .edit-pencil-btn { right:44px; }
    .reader.clean-mode [data-clean-target]:hover .clean-remove-btn, .reader.clean-mode [data-clean-target]:hover .edit-pencil-btn { opacity:1; }
    .reader.clean-mode [contenteditable="true"] { outline:2px solid rgba(13,110,253,.35); outline-offset:4px; border-radius:10px; }
    .reader.clean-mode [contenteditable="true"]:focus { outline-color:rgba(13,110,253,.55); }
    .clean-media-wrap { display:block; margin:14px 0; border-radius:14px; overflow:hidden; }
    .muted { color:var(--muted); }
    .list-item { border:1px solid var(--border); border-radius:10px; padding:10px; cursor:pointer; transition:border-color .12s ease, box-shadow .12s ease; background:#fff; }
    .list-item:hover { border-color:rgba(13,110,253,.35); box-shadow:0 1px 8px rgba(0,0,0,.05); }
    .list-item.active { border-color:rgba(13,110,253,.55); box-shadow:0 1px 10px rgba(13,110,253,.10); }
    .highlight-row { border:1px solid var(--border); border-radius:10px; padding:10px; cursor:pointer; background:#fff; }
    .highlight-row:hover { border-color:rgba(13,110,253,.30); }
    .highlight-row.active { border-color:rgba(13,110,253,.55); box-shadow:0 1px 10px rgba(13,110,253,.10); }
    .highlight-quote { font-size:.95rem; line-height:1.35rem; margin-bottom:6px; }
    .highlight-note { color:var(--muted); font-size:.85rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .toast-container { position:fixed; right:16px; bottom:16px; z-index:9999; }
    .content-editor { min-height:280px; height:280px; overflow:auto; white-space:pre-wrap; }
    .import-preview { border:1px solid var(--border); border-radius:10px; padding:14px; background:#fff; max-height:320px; overflow:auto; }
    .import-toolbar .btn { white-space:nowrap; }
    @media (max-width:1200px) { .main { grid-template-columns:320px minmax(0,1fr); } .right-panel { display:none; } }
    @media (max-width:900px) { .main { grid-template-columns:1fr; } .left-panel,.right-panel { display:none; } }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="topbar">
      <div class="container-fluid py-2 px-3 d-flex align-items-center justify-content-between gap-2">
        <div class="d-flex align-items-center gap-2">
          <span class="fw-semibold">Reader MVP</span>
          <span class="text-secondary small" id="current-article-pill"></span>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-outline-primary" id="import-btn"><i class="bi bi-file-earmark-plus"></i> 导入</button>
          <button class="btn btn-sm btn-outline-secondary" id="highlight-btn" disabled><i class="bi bi-highlighter"></i> 高亮选中</button>
          <div class="btn-group btn-group-sm" role="group" aria-label="font-size">
            <button class="btn btn-outline-secondary" id="font-dec" title="缩小字体">A-</button>
            <button class="btn btn-outline-secondary" id="font-inc" title="放大字体">A+</button>
          </div>
        </div>
      </div>
    </div>
    <div class="main">
      <div class="panel left-panel">
        <div class="panel-header">
          <div class="fw-semibold">文章</div>
          <button class="btn btn-sm btn-outline-secondary" id="refresh-articles"><i class="bi bi-arrow-clockwise"></i></button>
        </div>
        <div class="panel-body">
          <div class="mb-2"><input class="form-control form-control-sm" id="article-filter" placeholder="搜索标题..." /></div>
          <div class="d-grid gap-2" id="article-list"></div>
          <div class="mt-3 small muted" id="article-empty-hint" style="display:none;">还没有文章。点击右上角“导入”粘贴内容。</div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <div class="d-flex flex-column">
            <div class="fw-semibold" id="reader-title">未选择文章</div>
            <div class="small muted" id="reader-meta"></div>
          </div>
          <div class="d-flex align-items-center gap-2">
            <button class="btn btn-sm btn-outline-secondary" id="clean-mode-btn" style="display:none;" title="清理模式（点叉删除、点笔编辑）"><i class="bi bi-pencil-square"></i></button>
            <button class="btn btn-sm btn-outline-secondary" id="undo-clean-btn" style="display:none;" disabled title="撤销上一步"><i class="bi bi-arrow-counterclockwise"></i></button>
            <button class="btn btn-sm btn-primary" id="save-layout-btn" style="display:none;" disabled title="保存清理结果"><i class="bi bi-check2"></i></button>
            <button class="btn btn-sm btn-outline-danger" id="delete-article-btn" style="display:none;"><i class="bi bi-trash"></i></button>
          </div>
        </div>
        <div class="panel-body" style="padding:0;">
          <div class="reader" id="reader-content">
            <p class="muted">从左侧选择文章，或点击“导入”创建一篇新文章。</p>
            <p class="muted">MVP 限制：一次高亮必须落在同一个文本节点内，避免跨段落或跨元素。</p>
          </div>
        </div>
      </div>
      <div class="panel right-panel">
        <div class="panel-header">
          <div class="fw-semibold">高亮</div>
          <div class="small muted" id="highlight-count">0</div>
        </div>
        <div class="panel-body">
          <div class="mb-3" id="active-highlight-editor" style="display:none;">
            <div class="mb-2 small muted">选中高亮</div>
            <div class="mb-2">
              <label class="form-label form-label-sm mb-1">颜色</label>
              <select class="form-select form-select-sm" id="highlight-color">
                <option value="#fff3bf">黄色</option>
                <option value="#d3f9d8">绿色</option>
                <option value="#d0ebff">蓝色</option>
                <option value="#ffe3e3">红色</option>
                <option value="#f3d9fa">紫色</option>
              </select>
            </div>
            <div class="mb-2">
              <label class="form-label form-label-sm mb-1">笔记</label>
              <textarea class="form-control form-control-sm" rows="3" id="highlight-note" placeholder="写点你的理解..."></textarea>
            </div>
            <div class="d-flex gap-2">
              <button class="btn btn-sm btn-primary" id="save-highlight-btn">保存</button>
              <button class="btn btn-sm btn-outline-secondary" id="add-to-inbox-btn">加入词袋</button>
              <button class="btn btn-sm btn-outline-danger" id="delete-highlight-btn">删除</button>
            </div>
            <hr />
          </div>
          <div class="d-grid gap-2" id="highlight-list"></div>
          <div class="mt-3 small muted" id="highlight-empty-hint">没有高亮。选中文本后点击“高亮选中”。</div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="importModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">导入文章（粘贴）</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="row g-2">
            <div class="col-md-7">
              <label class="form-label">标题（可选）</label>
              <input class="form-control" id="import-title" placeholder="例如：Le Monde - ..." />
            </div>
            <div class="col-md-5">
              <label class="form-label">来源 URL（可选）</label>
              <input class="form-control" id="import-url" placeholder="https://..." />
            </div>
          </div>
          <div class="mt-3">
            <div class="d-flex align-items-end justify-content-between gap-3 flex-wrap import-toolbar">
              <div>
                <label class="form-label mb-1">导入模式</label>
                <div class="d-flex gap-3 flex-wrap">
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="importMode" id="modeAuto" value="auto" checked>
                    <label class="form-check-label" for="modeAuto">自动（优先 HTML）</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="importMode" id="modeHtml" value="html">
                    <label class="form-check-label" for="modeHtml">HTML</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="importMode" id="modeText" value="text">
                    <label class="form-check-label" for="modeText">纯文本</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="import-denoise" checked>
                    <label class="form-check-label" for="import-denoise">去噪（推荐）</label>
                  </div>
                </div>
                <div class="small muted mt-1" id="import-detected">粘贴时会优先尝试捕获 HTML，并做保结构清洗。</div>
              </div>
              <div class="btn-group btn-group-sm" role="group" aria-label="import view">
                <button type="button" class="btn btn-secondary" id="import-view-edit">编辑</button>
                <button type="button" class="btn btn-outline-secondary" id="import-view-preview">预览</button>
                <button type="button" class="btn btn-outline-secondary" id="import-clear">清空</button>
              </div>
            </div>
          </div>
          <div class="mt-3">
            <label class="form-label">粘贴正文</label>
            <div id="import-editor-wrap">
              <div class="form-control content-editor" id="import-content-editor" contenteditable="true" spellcheck="false"></div>
              <div class="small muted mt-2">提示：直接从网页复制粘贴时，会优先保留 HTML 结构，并尽量拆分段落、标题、列表与图片。</div>
            </div>
            <div id="import-preview-wrap" style="display:none;">
              <div class="row g-2">
                <div class="col-lg-8">
                  <div class="import-preview reader" id="import-preview"></div>
                </div>
                <div class="col-lg-4">
                  <div class="import-preview" id="import-preview-blocks"></div>
                </div>
              </div>
              <div class="small muted mt-2">左侧为清洗后预览；右侧可指定“正文从此开始”，保存后会按这个结果排版。</div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-primary" id="import-save-btn">保存并打开</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="inboxModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">加入词袋（Inbox）</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-2">
            <label class="form-label">表达（expression）</label>
            <input class="form-control" id="inbox-expression" placeholder="选中的词 / 短语..." />
          </div>
          <div class="mb-2">
            <label class="form-label">上下文（可选）</label>
            <textarea class="form-control" rows="3" id="inbox-context" placeholder="可以粘贴句子 / 段落..."></textarea>
          </div>
          <div class="mb-2">
            <label class="form-label">备注（可选）</label>
            <textarea class="form-control" rows="2" id="inbox-note" placeholder="你想记住的点..."></textarea>
          </div>
          <div class="small muted">状态默认是 draft，后续可继续做批量制卡。</div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-primary" id="inbox-save-btn">加入词袋</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API_BASE_CANDIDATES = (() => {
      const params = new URLSearchParams(window.location.search);
      const configured = params.get("api") || window.localStorage.getItem("reader_api_base") || "";
      const base = [];
      const push = (value) => {
        const normalized = (value || "").trim().replace(/\/+$/, "");
        if (!base.includes(normalized)) base.push(normalized);
      };
      push(configured);
      if (window.location.protocol !== "file:") push(window.location.origin);
      if (window.location.protocol === "file:") {
        push("http://127.0.0.1:5000");
        push("http://localhost:5000");
        push("http://127.0.0.1:8000");
        push("http://localhost:8000");
      }
      push("");
      return base;
    })();
    let resolvedApiBasePromise = null;
    const state = { articles: [], currentArticleId: null, currentArticle: null, highlights: [], activeHighlightId: null, fontSize: 18, importView: "edit", importLastPaste: { hasHtml: false, hasText: false, at: 0 }, importBodyStartIndex: null, cleanMode: false, cleanUndo: [], layoutDirty: false };
    const el = {
      currentArticlePill: document.getElementById("current-article-pill"),
      importBtn: document.getElementById("import-btn"),
      importModal: new bootstrap.Modal(document.getElementById("importModal")),
      importTitle: document.getElementById("import-title"),
      importUrl: document.getElementById("import-url"),
      importEditorWrap: document.getElementById("import-editor-wrap"),
      importPreviewWrap: document.getElementById("import-preview-wrap"),
      importEditor: document.getElementById("import-content-editor"),
      importPreview: document.getElementById("import-preview"),
      importPreviewBlocks: document.getElementById("import-preview-blocks"),
      importViewEdit: document.getElementById("import-view-edit"),
      importViewPreview: document.getElementById("import-view-preview"),
      importClear: document.getElementById("import-clear"),
      importDetected: document.getElementById("import-detected"),
      importDenoise: document.getElementById("import-denoise"),
      importSaveBtn: document.getElementById("import-save-btn"),
      articleList: document.getElementById("article-list"),
      articleEmptyHint: document.getElementById("article-empty-hint"),
      articleFilter: document.getElementById("article-filter"),
      refreshArticles: document.getElementById("refresh-articles"),
      readerTitle: document.getElementById("reader-title"),
      readerMeta: document.getElementById("reader-meta"),
      readerContent: document.getElementById("reader-content"),
      highlightBtn: document.getElementById("highlight-btn"),
      fontInc: document.getElementById("font-inc"),
      fontDec: document.getElementById("font-dec"),
      cleanModeBtn: document.getElementById("clean-mode-btn"),
      undoCleanBtn: document.getElementById("undo-clean-btn"),
      saveLayoutBtn: document.getElementById("save-layout-btn"),
      deleteArticleBtn: document.getElementById("delete-article-btn"),
      highlightCount: document.getElementById("highlight-count"),
      highlightList: document.getElementById("highlight-list"),
      highlightEmptyHint: document.getElementById("highlight-empty-hint"),
      activeHighlightEditor: document.getElementById("active-highlight-editor"),
      highlightColor: document.getElementById("highlight-color"),
      highlightNote: document.getElementById("highlight-note"),
      saveHighlightBtn: document.getElementById("save-highlight-btn"),
      deleteHighlightBtn: document.getElementById("delete-highlight-btn"),
      addToInboxBtn: document.getElementById("add-to-inbox-btn"),
      inboxModal: new bootstrap.Modal(document.getElementById("inboxModal")),
      inboxExpression: document.getElementById("inbox-expression"),
      inboxContext: document.getElementById("inbox-context"),
      inboxNote: document.getElementById("inbox-note"),
      inboxSaveBtn: document.getElementById("inbox-save-btn"),
      toastContainer: document.getElementById("toast-container")
    };

    function escapeHtml(str) {
      return (str ?? "").toString().replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll("\"", "&quot;").replaceAll("'", "&#039;");
    }
    function normalizeSpaces(text) { return (text || "").replace(/\s+/g, " ").trim(); }
    function toast(message, variant = "secondary") {
      const wrapper = document.createElement("div");
      wrapper.className = `toast align-items-center text-bg-${variant} border-0`;
      wrapper.role = "alert";
      wrapper.ariaLive = "assertive";
      wrapper.ariaAtomic = "true";
      wrapper.innerHTML = `<div class="d-flex"><div class="toast-body">${escapeHtml(message)}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button></div>`;
      el.toastContainer.appendChild(wrapper);
      const t = new bootstrap.Toast(wrapper, { delay: 2300 });
      t.show();
      wrapper.addEventListener("hidden.bs.toast", () => wrapper.remove());
    }
    async function resolveApiBase() {
      if (!resolvedApiBasePromise) {
        resolvedApiBasePromise = (async () => {
          for (const candidate of API_BASE_CANDIDATES) {
            const healthUrl = `${candidate}/api/health`;
            try {
              const res = await fetch(healthUrl, { method: "GET" });
              if (res.ok) {
                if (candidate) window.localStorage.setItem("reader_api_base", candidate);
                return candidate;
              }
            } catch (_) {}
          }
          return API_BASE_CANDIDATES[0] || "";
        })();
      }
      return resolvedApiBasePromise;
    }
    function friendlyFetchError(error) {
      const message = String(error?.message || error || "");
      if (message.includes("Failed to fetch") || message.includes("NetworkError")) {
        if (window.location.protocol === "file:") {
          return "无法连接后端接口。请先启动 Flask 服务，再通过 http://127.0.0.1:5000/reader 打开阅读器。";
        }
        return "无法连接后端接口，请确认 Flask 服务正在运行。";
      }
      return message || "请求失败";
    }
    async function api(path, options = {}) {
      const apiBase = await resolveApiBase();
      let res;
      try {
        res = await fetch(apiBase + path, { headers: { "Content-Type": "application/json", ...(options.headers || {}) }, ...options });
      } catch (error) {
        throw new Error(friendlyFetchError(error));
      }
      if (!res.ok) {
        const txt = await res.text().catch(() => "");
        throw new Error(txt || `HTTP ${res.status}`);
      }
      return (res.headers.get("content-type") || "").includes("application/json") ? res.json() : res.text();
    }
    function setFontSize(size) {
      state.fontSize = Math.max(14, Math.min(26, size));
      document.documentElement.style.setProperty("--reader-font-size", `${state.fontSize}px`);
    }
    function getImportMode() { return document.querySelector('input[name="importMode"]:checked')?.value || "auto"; }
    function isProbablyHtml(html) { return /<(p|h1|h2|h3|ul|ol|li|blockquote|pre|div|section|article|br|a|strong|em|span|img|figure|picture)\b/i.test(html || ""); }
    function shouldDropTextBlock(text) {
      const t = normalizeSpaces(text);
      if (!t) return true;
      if (!el.importDenoise.checked) return false;
      const lower = t.toLowerCase();
      return /^https?:\/\//.test(lower) || lower.includes("vous pouvez partager un article") || (lower.includes("reproduction totale") && lower.includes("le monde")) || lower.includes("conditions générales de vente") || lower.includes("conditions generales de vente") || lower.includes("syndication@lemonde.fr") || /^newsletter\b/.test(lower) || /^nos analyses\b/.test(lower) || /^toutes les newsletters\b/.test(lower) || /^à lire aussi\b/.test(lower) || /^a lire aussi\b/.test(lower) || /^vid[ée]o\b/.test(lower) || (/^logo\b/.test(lower) && t.length < 140);
    }

    function setBlockEditing(block, enabled) {
      if (!block) return;
      if (enabled) {
        block.setAttribute("contenteditable", "true");
        block.setAttribute("spellcheck", "true");
        if (!block.dataset.editBound) {
          block.dataset.editBound = "1";
          block.addEventListener("input", () => setLayoutDirty(true), { passive: true });
          block.addEventListener("keydown", (event) => {
            if (event.key === "Escape") {
              event.preventDefault();
              setBlockEditing(block, false);
              block.blur();
            }
          });
        }
        block.addEventListener("blur", () => setBlockEditing(block, false), { once: true, capture: true });
        block.focus();
        placeCaretAtEnd(block);
      } else {
        block.removeAttribute("contenteditable");
        block.removeAttribute("spellcheck");
      }
    }
    function ensureCleanButton(target, onRemove) {
      if (!target || target.querySelector(":scope > .clean-remove-btn")) return;
      target.dataset.cleanTarget = "1";
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "clean-remove-btn";
      btn.textContent = "×";
      btn.addEventListener("click", (event) => { event.preventDefault(); event.stopPropagation(); onRemove(); });
      target.appendChild(btn);
    }
    function ensureEditButton(target) {
      if (!target || target.querySelector(":scope > .edit-pencil-btn") || !isEditableTextBlock(target)) return;
      target.dataset.cleanTarget = "1";
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "edit-pencil-btn";
      btn.textContent = "✎";
      btn.title = "编辑段落";
      btn.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        setBlockEditing(target, target.getAttribute("contenteditable") !== "true");
      });
      target.appendChild(btn);
    }
    function wrapCleanMedia(node) {
      const existing = node.closest(".clean-media-wrap");
      if (existing) return existing;
      const wrap = document.createElement("div");
      wrap.className = "clean-media-wrap";
      node.parentNode?.insertBefore(wrap, node);
      wrap.appendChild(node);
      return wrap;
    }
    function applyCleanModeDecorations() {
      el.readerContent.querySelectorAll(".clean-remove-btn,.edit-pencil-btn").forEach((n) => n.remove());
      el.readerContent.querySelectorAll("[data-clean-target]").forEach((n) => n.removeAttribute("data-clean-target"));
      el.readerContent.querySelectorAll("figure,picture,video,iframe,embed,object").forEach((node) => { if (!node.closest(".reader-article-header")) ensureCleanButton(wrapCleanMedia(node), () => removeNodeWithUndo(wrapCleanMedia(node))); });
      el.readerContent.querySelectorAll("img").forEach((img) => { if (!img.closest(".reader-article-header") && !img.closest("figure,picture")) ensureCleanButton(wrapCleanMedia(img), () => removeNodeWithUndo(wrapCleanMedia(img))); });
      Array.from(el.readerContent.children).forEach((child) => {
        if (child.classList.contains("reader-article-header")) return;
        ensureCleanButton(child, () => removeNodeWithUndo(child));
        ensureEditButton(child);
      });
      const title = el.readerContent.querySelector(".reader-article-title");
      if (title) ensureEditButton(title);
      el.readerContent.querySelectorAll(".reader-article-deck p").forEach((p) => ensureEditButton(p));
    }
    function toggleCleanMode() {
      if (!state.currentArticleId) return;
      state.cleanMode = !state.cleanMode;
      el.readerContent.classList.toggle("clean-mode", state.cleanMode);
      if (state.cleanMode) {
        state.cleanUndo = [];
        el.undoCleanBtn.style.display = "inline-block";
        el.undoCleanBtn.disabled = true;
        el.highlightBtn.disabled = true;
        applyCleanModeDecorations();
        toast("进入清理模式：悬停显示删除和编辑按钮。", "secondary");
      } else {
        el.readerContent.querySelectorAll(".clean-remove-btn,.edit-pencil-btn").forEach((n) => n.remove());
        el.readerContent.querySelectorAll("[data-clean-target]").forEach((n) => n.removeAttribute("data-clean-target"));
        el.readerContent.querySelectorAll('[contenteditable="true"]').forEach((n) => { n.removeAttribute("contenteditable"); n.removeAttribute("spellcheck"); });
        el.readerContent.querySelectorAll(".clean-media-wrap").forEach((wrap) => {
          const parent = wrap.parentNode;
          while (wrap.firstChild) parent.insertBefore(wrap.firstChild, wrap);
          parent.removeChild(wrap);
        });
        el.undoCleanBtn.style.display = "none";
        el.undoCleanBtn.disabled = true;
        toast("退出清理模式", "secondary");
      }
    }
    function serializeReaderContentForSave() {
      const clone = el.readerContent.cloneNode(true);
      clone.querySelectorAll(".clean-remove-btn,.edit-pencil-btn").forEach((n) => n.remove());
      clone.querySelectorAll("[data-clean-target]").forEach((n) => n.removeAttribute("data-clean-target"));
      clone.querySelectorAll('[contenteditable="true"]').forEach((n) => { n.removeAttribute("contenteditable"); n.removeAttribute("spellcheck"); });
      clone.querySelectorAll(".clean-media-wrap").forEach((wrap) => {
        const parent = wrap.parentNode;
        while (wrap.firstChild) parent.insertBefore(wrap.firstChild, wrap);
        parent.removeChild(wrap);
      });
      clone.querySelectorAll("mark[data-highlight-id]").forEach((mark) => {
        const parent = mark.parentNode;
        while (mark.firstChild) parent.insertBefore(mark.firstChild, mark);
        parent.removeChild(mark);
      });
      clone.normalize();
      return clone.innerHTML;
    }
    async function saveLayoutChanges() {
      if (!state.currentArticleId || !state.currentArticle || !state.layoutDirty) return;
      if (state.highlights.length && !window.confirm("当前文章已经有高亮。移动或删除内容可能会导致旧高亮失效，仍要保存吗？")) return;
      const title = normalizeSpaces(el.readerContent.querySelector(".reader-article-title")?.textContent || state.currentArticle.title || "");
      const res = await api(`/api/articles/${encodeURIComponent(state.currentArticleId)}`, { method: "PATCH", body: JSON.stringify({ content_html: serializeReaderContentForSave(), title }) });
      state.currentArticle = res.article || state.currentArticle;
      setLayoutDirty(false);
      toast("已保存清理结果", "success");
      await openArticle(state.currentArticleId);
    }
    async function deleteCurrentArticle() {
      if (!state.currentArticleId || !window.confirm("确定删除这篇文章及其高亮和相关词袋吗？")) return;
      const id = state.currentArticleId;
      await api(`/api/articles/${encodeURIComponent(id)}`, { method: "DELETE" });
      state.currentArticleId = null;
      state.currentArticle = null;
      state.highlights = [];
      state.activeHighlightId = null;
      el.readerTitle.textContent = "未选择文章";
      el.readerMeta.textContent = "";
      el.readerContent.innerHTML = `<p class="muted">从左侧选择文章，或点击“导入”创建一篇新文章。</p><p class="muted">MVP 限制：一次高亮必须落在同一个文本节点内，避免跨段落或跨元素。</p>`;
      el.currentArticlePill.textContent = "";
      el.cleanModeBtn.style.display = "none";
      el.undoCleanBtn.style.display = "none";
      el.saveLayoutBtn.style.display = "none";
      el.deleteArticleBtn.style.display = "none";
      el.activeHighlightEditor.style.display = "none";
      await loadArticles();
      toast("已删除文章", "secondary");
    }
    function openInboxModal() {
      const current = state.highlights.find((h) => h.id === state.activeHighlightId);
      if (!current) return;
      el.inboxExpression.value = (current.quote_text || "").trim().slice(0, 120);
      el.inboxContext.value = "";
      el.inboxNote.value = (current.note || "").trim();
      el.inboxModal.show();
    }
    async function saveInboxItem() {
      if (!state.currentArticleId || !state.activeHighlightId) return;
      const expression = (el.inboxExpression.value || "").trim();
      if (!expression) return toast("expression 不能为空", "warning");
      await api("/api/vocab-inbox", { method: "POST", body: JSON.stringify({ article_id: state.currentArticleId, highlight_id: state.activeHighlightId, expression, context_sentence: (el.inboxContext.value || "").trim(), user_note: (el.inboxNote.value || "").trim(), status: "draft" }) });
      el.inboxModal.hide();
      toast("已加入词袋", "success");
    }
    function handleSelectionChange() {
      const info = selectionInReader();
      if (!info) return void (el.highlightBtn.disabled = true);
      el.highlightBtn.disabled = !info.valid;
    }
    function resetImportModal() {
      el.importTitle.value = "";
      el.importUrl.value = "";
      el.importEditor.innerHTML = "";
      document.getElementById("modeAuto").checked = true;
      el.importDenoise.checked = true;
      state.importLastPaste = { hasHtml: false, hasText: false, at: 0 };
      state.importBodyStartIndex = null;
      updateImportDetectedHint();
      setImportView("edit");
    }
    el.importBtn.addEventListener("click", () => { resetImportModal(); el.importModal.show(); });
    el.importEditor.addEventListener("paste", (event) => {
      state.importLastPaste = { hasHtml: Boolean(event.clipboardData?.getData("text/html")), hasText: Boolean(event.clipboardData?.getData("text/plain")), at: Date.now() };
      setTimeout(() => updateImportDetectedHint(), 0);
    });
    el.importViewEdit.addEventListener("click", () => setImportView("edit"));
    el.importViewPreview.addEventListener("click", () => setImportView("preview"));
    el.importClear.addEventListener("click", () => {
      el.importEditor.innerHTML = "";
      state.importBodyStartIndex = null;
      state.importLastPaste = { hasHtml: false, hasText: false, at: 0 };
      updateImportDetectedHint("已清空");
      if (state.importView === "preview") setImportView("preview");
    });
    document.querySelectorAll('input[name="importMode"]').forEach((radio) => radio.addEventListener("change", () => { updateImportDetectedHint(); if (state.importView === "preview") setImportView("preview"); }));
    el.importDenoise.addEventListener("change", () => { if (state.importView === "preview") setImportView("preview"); });
    el.importSaveBtn.addEventListener("click", async () => {
      const title = (el.importTitle.value || "").trim();
      const source_url = (el.importUrl.value || "").trim();
      const rawText = ((el.importEditor.innerText || "") + (el.importEditor.querySelector("img") ? " [img]" : "")).trim();
      if (!rawText) return toast("内容不能为空", "warning");
      const built = buildImportedContentWithBlocks(state.importBodyStartIndex);
      try {
        const data = await api("/api/articles", { method: "POST", body: JSON.stringify({ title: title || inferTitleFromContentHtml(built.content_html), source_url, content_raw: built.content_raw, content_html: built.content_html }) });
        el.importModal.hide();
        toast("已导入文章", "success");
        await loadArticles();
        await openArticle(data.article.id);
      } catch (error) {
        toast(`导入失败：${error.message || "unknown"}`, "danger");
      }
    });
    el.articleFilter.addEventListener("input", renderArticles);
    el.refreshArticles.addEventListener("click", () => loadArticles().catch((e) => toast(e.message, "danger")));
    el.fontInc.addEventListener("click", () => setFontSize(state.fontSize + 1));
    el.fontDec.addEventListener("click", () => setFontSize(state.fontSize - 1));
    el.highlightBtn.addEventListener("click", () => createHighlightFromSelection().catch((e) => toast(e.message, "danger")));
    el.cleanModeBtn.addEventListener("click", () => { try { toggleCleanMode(); } catch (e) { toast(e.message || "清理模式切换失败", "danger"); } });
    el.undoCleanBtn.addEventListener("click", undoCleanRemove);
    el.saveLayoutBtn.addEventListener("click", () => saveLayoutChanges().catch((e) => toast(e.message, "danger")));
    el.deleteArticleBtn.addEventListener("click", () => deleteCurrentArticle().catch((e) => toast(e.message, "danger")));
    el.saveHighlightBtn.addEventListener("click", () => saveActiveHighlight().catch((e) => toast(e.message, "danger")));
    el.deleteHighlightBtn.addEventListener("click", () => deleteActiveHighlight().catch((e) => toast(e.message, "danger")));
    el.addToInboxBtn.addEventListener("click", openInboxModal);
    el.inboxSaveBtn.addEventListener("click", () => saveInboxItem().catch((e) => toast(e.message, "danger")));
    document.addEventListener("selectionchange", handleSelectionChange);
    el.readerContent.addEventListener("click", () => setActiveHighlight(null));
    document.addEventListener("keydown", (event) => {
      if ((event.ctrlKey || event.metaKey) && !event.altKey && (event.key === "z" || event.key === "Z") && state.cleanMode && state.cleanUndo.length) {
        const tag = document.activeElement?.tagName?.toUpperCase();
        if (tag !== "INPUT" && tag !== "TEXTAREA") {
          event.preventDefault();
          undoCleanRemove();
          return;
        }
      }
      if (!event.metaKey && !event.ctrlKey && !event.altKey && (event.key === "h" || event.key === "H") && !el.highlightBtn.disabled) {
        event.preventDefault();
        createHighlightFromSelection().catch((e) => toast(e.message, "danger"));
      }
      if (event.key === "Escape") setActiveHighlight(null);
    });
    setFontSize(state.fontSize);
    updateImportDetectedHint();
    loadArticles().catch((e) => toast(`无法加载文章：${e.message}`, "danger"));
  </script>
</body>
</html>
